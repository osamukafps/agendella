services:
  postgres:
    image: postgres:16
    container_name: agendella-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agendella_dev
      POSTGRES_USER: agendella
      POSTGRES_PASSWORD: agendella
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendella -d agendella_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
