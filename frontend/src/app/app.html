<main class="min-h-screen bg-slate-950 text-slate-50">
  <section class="mx-auto flex min-h-screen max-w-5xl flex-col items-start justify-center gap-6 px-6 py-16 sm:px-10">
    <span class="rounded-full border border-cyan-400/30 bg-cyan-400/10 px-3 py-1 text-sm font-medium text-cyan-200">
      Fase 0 bootstrap
    </span>
    <h1 class="max-w-3xl text-4xl font-semibold tracking-tight sm:text-5xl">
      {{ title() }}
    </h1>
    <p class="max-w-2xl text-base leading-7 text-slate-300 sm:text-lg">
      Monorepo inicial com API .NET 10 e SPA Angular prontos para evoluir o MVP de agendamento.
    </p>
    <div class="grid gap-3 text-sm text-slate-300 sm:grid-cols-2">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <strong class="block text-slate-100">Backend</strong>
        ASP.NET Core Web API, solution em `backend/Agendella.slnx` e testes xUnit.
      </div>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <strong class="block text-slate-100">Frontend</strong>
        Angular standalone com TailwindCSS e Vitest configurados no bootstrap.
      </div>
    </div>
    <router-outlet />
  </section>
</main>
